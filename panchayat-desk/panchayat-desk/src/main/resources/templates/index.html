<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanchayatDesk</title>

    <style>

        /* ===== BASE ===== */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #6366f1, #0b1020, #8b5cf6, #0b1020);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* ===== FLOATING BACKGROUND ===== */
        .blob {
            position: absolute;
            width: 280px;
            height: 280px;
            background: #22c55e;
            filter: blur(120px);
            opacity: 0.25;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }

        .blob:nth-child(1) { top: 10%; left: 10%; }
        .blob:nth-child(2) { bottom: 10%; right: 10%; background: #6366f1; }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(25px); }
        }

        /* ===== NAVBAR ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            box-sizing: border-box;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .logo span {
            color: #22c55e;
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        /* buttons */
        .nav-btn {
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .login {
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
        }

        .login:hover {
            background: rgba(255,255,255,0.15);
        }

        .register {
            background: #22c55e;
            color: white;
        }

        .register:hover {
            transform: translateY(-2px);
            background: #16a34a;
        }

        /* ===== HERO ===== */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .hero-box {
            max-width: 800px;
            padding: 50px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: fadeUp 1s ease;
        }

        .hero h1 {
            font-size: 58px;
            font-weight: 900;
            line-height: 1.1;
        }

        .hero p {
            font-size: 18px;
            margin-top: 15px;
            color: #cbd5e1;
        }

        /* buttons */
        .btns {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .green {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 0 25px rgba(34,197,94,0.4);
        }

        .green:hover {
            transform: scale(1.05);
        }

        .outline {
            border: 1px solid white;
            color: white;
        }

        .outline:hover {
            background: white;
            color: #0b1020;
        }

        /* animation */
        @keyframes fadeUp {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }

    </style>
</head>

<body>

<!-- background -->
<div class="blob"></div>
<div class="blob"></div>

<!-- NAV -->
<nav>
    <a href="#" class="logo">Panchayat<span>Desk</span></a>

    <div class="nav-links">
        <a href="/login" class="nav-btn login">Login</a>
        <a href="/register" class="nav-btn register">Register</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-box">
        <h1>Society Complaint Management System</h1>
        <p>Submit complaints, track progress, and get faster resolutions — all in one modern platform.</p>

        <div class="btns">
            <a href="/register" class="btn green">🚀 Get Started</a>
            <a href="/login" class="btn outline">🔐 Login</a>
        </div>
    </div>
</section>

</body>
</html>
