<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Complaint Detail — PanchayatDesk</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f8fafc;
    }

    /* NAVBAR */
    .modern-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 30px;
      background: #6366f1;
      color: white;
    }

    .nav-brand {
      font-weight: 700;
      font-size: 18px;
      color: white;
      text-decoration: none;
    }

    .nav-btn {
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      background: #ef4444;
      color: white;
    }

    /* CARD */
    .card-modern {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .title {
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* TABLE */
    .table-modern {
      width: 100%;
    }

    .table-modern th {
      width: 160px;
      color: #475569;
    }

    /* BADGES */
    .badge-modern {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
    }

    .badge-pending { background:#fef3c7; color:#d97706; }
    .badge-resolved { background:#d1fae5; color:#059669; }
    .badge-inprogress { background:#dbeafe; color:#2563eb; }
    .badge-rejected { background:#fee2e2; color:#b91c1c; }

    /* BUTTON */
    .btn-modern {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #6366f1;
      color: white;
      text-decoration: none;
    }

    /* CHATBOT */
    .chatbot-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 50%;
      padding: 14px;
      font-size: 18px;
    }

    .chatbot-window {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 320px;
      background: #f8fafc;
      border-radius: 12px;
      display: none;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .chatbot-header {
      background: #6366f1;
      color: white;
      padding: 10px;
    }

    .chatbot-messages {
      height: 250px;
      overflow-y: auto;
      padding: 10px;
    }

    .chatbot-input {
      display: flex;
      gap: 5px;
      padding: 10px;
    }
  </style>
</head>

<body>

<nav class="modern-nav">
  <a href="/resident/dashboard" class="nav-brand">← Back</a>
  <form th:action="@{/logout}" method="post">
    <button class="nav-btn">Logout</button>
  </form>
</nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card-modern">

        <h5 class="title">Complaint Details</h5>

        <table class="table-modern">
          <tr><th>Title:</th><td th:text="${complaint.title}"></td></tr>
          <tr><th>Category:</th><td th:text="${complaint.category}"></td></tr>
          <tr><th>Priority:</th><td th:text="${complaint.priority}"></td></tr>

          <tr>
            <th>Status:</th>
            <td>
              <span th:class="${'badge-modern ' +
                (complaint.status.name() == 'PENDING' ? 'badge-pending' :
                 complaint.status.name() == 'RESOLVED' ? 'badge-resolved' :
                 complaint.status.name() == 'IN_PROGRESS' ? 'badge-inprogress' : 'badge-rejected')}"
                    th:text="${complaint.status}">
              </span>
            </td>
          </tr>

          <tr><th>Description:</th><td th:text="${complaint.description}"></td></tr>
          <tr><th>Submitted:</th><td th:text="${#temporals.format(complaint.createdAt, 'dd MMM yyyy HH:mm')}"></td></tr>

          <tr th:if="${complaint.secretaryReply != null}">
            <th>Reply:</th>
            <td th:text="${complaint.secretaryReply}"></td>
          </tr>

          <tr th:if="${complaint.resolvedAt != null}">
            <th>Resolved:</th>
            <td th:text="${#temporals.format(complaint.resolvedAt, 'dd MMM yyyy HH:mm')}"></td>
          </tr>
        </table>

        <a href="/resident/complaints" class="btn-modern mt-3">← Back to Complaints</a>

      </div>

    </div>
  </div>
</div>

<button class="chatbot-btn" onclick="toggleChat()">💬</button>

<div class="chatbot-window" id="chatWindow">
  <div class="chatbot-header">🤖 AI Assistant</div>
  <div class="chatbot-messages" id="chatMessages"></div>
  <div class="chatbot-input">
    <input type="text" id="chatInput" class="form-control">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  function toggleChat() {
    const win = document.getElementById('chatWindow');
    win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
  }
</script>

</body>
</html>
