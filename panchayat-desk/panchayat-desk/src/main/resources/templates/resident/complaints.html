<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Complaints — PanchayatDesk</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f8fafc;
    }

    /* NAVBAR */
    .modern-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 30px;
      background: #6366f1;
      color: white;
    }

    .nav-brand {
      font-weight: 700;
      font-size: 20px;
      color: white;
      text-decoration: none;
    }

    .nav-btn {
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      background: #ef4444;
      color: white;
    }

    /* LAYOUT */
    .app-layout {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: white;
      height: calc(100vh - 60px);
      padding: 20px;
      border-right: 1px solid #e2e8f0;
    }

    .sidebar-link {
      display: block;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      color: #334155;
      margin-bottom: 8px;
    }

    .sidebar-link.active,
    .sidebar-link:hover {
      background: #eef2ff;
      color: #6366f1;
    }

    /* MAIN */
    .main-content {
      flex: 1;
      padding: 25px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 700;
    }

    .page-subtitle {
      color: #64748b;
    }

    /* CARD */
    .card-modern {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    /* TABLE */
    .table-modern {
      width: 100%;
      border-collapse: collapse;
    }

    .table-modern th, .table-modern td {
      padding: 10px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 14px;
    }

    /* BADGES */
    .badge-modern {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .badge-pending { background:#fef3c7; color:#d97706; }
    .badge-resolved { background:#d1fae5; color:#059669; }
    .badge-inprogress { background:#dbeafe; color:#2563eb; }
    .badge-rejected { background:#fee2e2; color:#b91c1c; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 20px;
      color: #64748b;
    }

    /* CHATBOT */
    .chatbot-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 50%;
      padding: 14px;
      font-size: 18px;
    }

    .chatbot-window {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      background: #f8fafc;
      border-radius: 12px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .chatbot-header {
      background: #6366f1;
      color: white;
      padding: 10px;
    }

    .chatbot-messages {
      height: 200px;
      overflow-y: auto;
      padding: 10px;
    }

    .chatbot-input {
      display: flex;
      gap: 5px;
      padding: 10px;
    }
  </style>
</head>

<body>

<nav class="modern-nav">
  <a href="/resident/dashboard" class="nav-brand">PanchayatDesk</a>
  <div>
    👤 <span th:text="${user.name}"></span>
    <form th:action="@{/logout}" method="post" style="display:inline;">
      <button class="nav-btn">Logout</button>
    </form>
  </div>
</nav>

<div class="app-layout">

  <aside class="sidebar">
    <a href="/resident/dashboard" class="sidebar-link">🏠 Dashboard</a>
    <a href="/resident/complaint/new" class="sidebar-link">➕ New Complaint</a>
    <a href="/resident/complaints" class="sidebar-link active">📋 My Complaints</a>
  </aside>

  <main class="main-content">

    <h1 class="page-title">My Complaints</h1>
    <p class="page-subtitle">Track all your submitted complaints</p>

    <div class="card-modern">

      <table class="table-modern">
        <thead>
        <tr>
          <th>#</th>
          <th>Title</th>
          <th>Category</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="c, i : ${complaints}">
          <td th:text="${i.index + 1}"></td>
          <td th:text="${c.title}"></td>
          <td th:text="${c.category}"></td>
          <td>
            <span class="badge-modern badge-pending" th:text="${c.priority}"></span>
          </td>
          <td>
            <span class="badge-modern badge-inprogress" th:text="${c.status}"></span>
          </td>
          <td th:text="${#temporals.format(c.createdAt, 'dd MMM yyyy')}"></td>
          <td>
            <a th:href="@{/resident/complaint/{id}(id=${c.id})}"
               class="btn btn-sm btn-outline-primary">View</a>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(complaints)}">
          <td colspan="6">
            <div class="empty-state">📭 No complaints yet!</div>
          </td>
        </tr>
        </tbody>
      </table>

    </div>

  </main>
</div>

<button class="chatbot-btn" onclick="toggleChat()">💬</button>

<div class="chatbot-window" id="chatWindow">
  <div class="chatbot-header">🤖 AI Assistant</div>
  <div class="chatbot-messages" id="chatMessages"></div>
  <div class="chatbot-input">
    <input type="text" id="chatInput" class="form-control">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  function toggleChat() {
    const win = document.getElementById('chatWindow');
    win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
  }
</script>

</body>
</html>
