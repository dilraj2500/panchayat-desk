<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Secretary Dashboard — PanchayatDesk</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --bg-light: #f8fafc;
            --bg-lighter: #f1f5f9;
            --sidebar-width: 220px;
            --nav-height: 60px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); }

        /* NAV */
        .modern-nav {
            position: fixed;
            top:0; left:0; right:0;
            height: var(--nav-height);
            background:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 24px;
            border-bottom:1px solid var(--border-color);
            z-index:1000;
        }

        .nav-brand { font-weight:800; text-decoration:none; color:var(--text-primary); }
        .nav-brand span { color:var(--primary-color); }

        .nav-btn { padding:8px 14px; border:none; border-radius:8px; cursor:pointer; }
        .nav-btn-danger { background:rgba(239,68,68,0.1); color:var(--danger-color); }

        /* LAYOUT */
        .app-layout { display:flex; padding-top:var(--nav-height); }

        /* SIDEBAR */
        .sidebar {
            width:var(--sidebar-width);
            position:fixed;
            top:var(--nav-height);
            bottom:0;
            background:white;
            border-right:1px solid var(--border-color);
            padding:20px 12px;
        }

        .sidebar-link {
            display:flex;
            gap:10px;
            padding:10px;
            text-decoration:none;
            color:var(--text-secondary);
            border-radius:8px;
            margin-bottom:4px;
        }

        .sidebar-link:hover { background:var(--bg-lighter); color:var(--text-primary); }

        .sidebar-link.active { background:#eef2ff; color:var(--primary-color); }

        /* MAIN */
        .main-content {
            margin-left: var(--sidebar-width);
            padding:32px;
            width:100%;
        }

        /* STATS */
        .stat-card {
            background:white;
            padding:20px;
            border-radius:12px;
            border:1px solid var(--border-color);
        }

        .stat-value { font-size:28px; font-weight:800; }

        /* TABLE */
        .table-modern {
            width:100%;
            background:white;
            border-radius:12px;
            overflow:hidden;
        }

        .table-modern th, .table-modern td {
            padding:12px;
            border-bottom:1px solid var(--border-color);
        }

        /* BADGES */
        .badge-modern { padding:4px 10px; border-radius:20px; font-size:12px; }

        .badge-pending { background:#fef3c7; color:#d97706; }
        .badge-resolved { background:#d1fae5; color:#059669; }
        .badge-inprogress { background:#dbeafe; color:#2563eb; }
        .badge-rejected { background:#fee2e2; color:#dc2626; }
    </style>
</head>

<body>

<!-- NAV -->
<nav class="modern-nav">
    <a href="/secretary/dashboard" class="nav-brand">Panchayat<span>Desk</span></a>

    <div>
        <span th:text="${user.name}"></span>

        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button class="nav-btn nav-btn-danger">Logout</button>
        </form>
    </div>
</nav>

<!-- LAYOUT -->
<div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <a class="sidebar-link active" href="/secretary/dashboard">🏠 Dashboard</a>
        <a class="sidebar-link" href="/secretary/complaints">📋 Complaints</a>
        <a class="sidebar-link" href="/secretary/residents">👥 Residents</a>
        <a class="sidebar-link" href="/secretary/flats">🏠 Flats</a>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <h2>Secretary Dashboard</h2>
        <p th:text="'Society: ' + ${user.society.name}"></p>

        <!-- STATS -->
        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:20px;">
            <div class="stat-card">
                <div>Total</div>
                <div class="stat-value" th:text="${complaints.size()}">0</div>
            </div>

            <div class="stat-card">
                <div>Pending</div>
                <div class="stat-value" th:text="${pendingCount}">0</div>
            </div>

            <div class="stat-card">
                <div>In Progress</div>
                <div class="stat-value" th:text="${inProgressCount}">0</div>
            </div>

            <div class="stat-card">
                <div>Resolved</div>
                <div class="stat-value" th:text="${resolvedCount}">0</div>
            </div>
        </div>

        <!-- TABLE -->
        <div>
            <table class="table-modern">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Resident</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="c, stat : ${complaints}">

                    <td th:text="${stat.index + 1}"></td>

                    <td th:text="${c.resident != null ? c.resident.name : 'N/A'}"></td>

                    <td th:text="${c.title}"></td>

                    <td th:text="${c.category}"></td>

                    <td>
                        <span class="badge-modern"
                              th:classappend="${
                                c.status.toString() == 'PENDING' ? 'badge-pending' :
                                c.status.toString() == 'RESOLVED' ? 'badge-resolved' :
                                c.status.toString() == 'IN_PROGRESS' ? 'badge-inprogress' :
                                'badge-rejected'
                              }"
                              th:text="${c.status}">
                        </span>
                    </td>

                    <td>
                        <a th:href="@{/secretary/complaint/{id}(id=${c.id})}"
                           style="background:var(--primary-color); color:white; padding:6px 12px; border-radius:6px; text-decoration:none;">
                            View
                        </a>
                    </td>

                </tr>

                <tr th:if="${complaints == null or #lists.isEmpty(complaints)}">
                    <td colspan="6" style="text-align:center; padding:20px;">
                        No complaints found
                    </td>
                </tr>

                </tbody>
            </table>
        </div>

    </main>
</div>

<!-- CHAT -->
<script>
    function sendMessage() {
        const input = document.getElementById("chatInput");
        const msg = input.value.trim();
        if (!msg) return;

        const box = document.getElementById("chatMessages");

        const userDiv = document.createElement("div");
        userDiv.textContent = msg;
        userDiv.style.textAlign = "right";
        userDiv.style.margin = "6px 0";
        box.appendChild(userDiv);

        input.value = "";
    }
</script>

</body>
</html>
