<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Events — Secretary</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; }
    .modern-nav { display:flex; justify-content:space-between; align-items:center;
      padding:14px 30px; background:#6366f1; color:white; }
    .nav-brand { font-weight:700; font-size:18px; color:white; text-decoration:none; }
    .nav-btn { border:none; padding:6px 14px; border-radius:6px; background:#ef4444; color:white; cursor:pointer; }
    .card-modern { background:white; border-radius:12px; padding:25px; box-shadow:0 4px 20px rgba(0,0,0,0.06); }
    .event-card { border-left: 4px solid #6366f1; padding:16px; border-radius:8px;
      background:white; box-shadow:0 2px 8px rgba(0,0,0,0.05); margin-bottom:16px; }
    .badge-active { background:#d1fae5; color:#059669; padding:4px 10px; border-radius:20px; font-size:12px; }
    .badge-cancelled { background:#fee2e2; color:#b91c1c; padding:4px 10px; border-radius:20px; font-size:12px; }
  </style>
</head>
<body>
<nav class="modern-nav">
  <a href="/secretary/dashboard" class="nav-brand">🏢 PanchayatDesk</a>
  <div class="d-flex gap-3 align-items-center">
    <span th:text="${user.name}" style="font-size:14px;"></span>
    <form th:action="@{/logout}" method="post">
      <button class="nav-btn">Logout</button>
    </form>
  </div>
</nav>

<div class="container py-4">
  <div th:if="${param.added}" class="alert alert-success alert-dismissible fade show">
    ✅ Event created! <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${param.cancelled}" class="alert alert-info alert-dismissible fade show">
    🚫 Event cancelled. <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="row">
    <!-- Create Event Form -->
    <div class="col-md-4 mb-4">
      <div class="card-modern">
        <h5 class="fw-bold mb-3">📅 Create New Event</h5>
        <form th:action="@{/secretary/event/add}" method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Event Title</label>
            <input type="text" name="title" class="form-control" placeholder="Diwali Celebration" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Date & Time</label>
            <input type="datetime-local" name="eventDate" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Venue</label>
            <input type="text" name="venue" class="form-control" placeholder="Society Clubhouse">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="3"
                      placeholder="Event details..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">Create Event</button>
        </form>
      </div>
    </div>

    <!-- Events List -->
    <div class="col-md-8">
      <h5 class="fw-bold mb-3">📋 All Events</h5>
      <div th:if="${events.empty}" class="text-muted">No events created yet.</div>
      <div th:each="event : ${events}" class="event-card">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <span th:class="${event.isActive} ? 'badge-active' : 'badge-cancelled'"
                  th:text="${event.isActive} ? 'Active' : 'Cancelled'"></span>
            <h6 class="fw-bold mt-2 mb-1" th:text="${event.title}"></h6>
            <div class="text-muted small">
              📅 <span th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy HH:mm')}"></span>
            </div>
            <div class="text-muted small" th:if="${event.venue}">
              📍 <span th:text="${event.venue}"></span>
            </div>
            <p class="text-secondary small mt-1" th:text="${event.description}"></p>
          </div>
          <form th:if="${event.isActive}"
                th:action="@{/secretary/event/{id}/cancel(id=${event.id})}" method="post"
                onsubmit="return confirm('Cancel this event?')">
            <button class="btn btn-sm btn-outline-danger">Cancel</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
