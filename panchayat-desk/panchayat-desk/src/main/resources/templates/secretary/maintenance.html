<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Maintenance — Secretary</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; }
    .modern-nav { display:flex; justify-content:space-between; align-items:center;
      padding:14px 30px; background:#6366f1; color:white; }
    .nav-brand { font-weight:700; font-size:18px; color:white; text-decoration:none; }
    .nav-btn { border:none; padding:6px 14px; border-radius:6px; background:#ef4444; color:white; cursor:pointer; }
    .stat-card { background:white; border-radius:12px; padding:20px; box-shadow:0 4px 20px rgba(0,0,0,0.06); text-align:center; }
    .card-modern { background:white; border-radius:12px; padding:25px; box-shadow:0 4px 20px rgba(0,0,0,0.06); }
    .badge-paid { background:#d1fae5; color:#059669; padding:4px 10px; border-radius:20px; font-size:12px; }
    .badge-unpaid { background:#fef3c7; color:#d97706; padding:4px 10px; border-radius:20px; font-size:12px; }
    .badge-overdue { background:#fee2e2; color:#b91c1c; padding:4px 10px; border-radius:20px; font-size:12px; }
  </style>
</head>
<body>
<nav class="modern-nav">
  <a href="/secretary/dashboard" class="nav-brand">🏢 PanchayatDesk</a>
  <div class="d-flex gap-3 align-items-center">
    <span th:text="${user.name}" style="font-size:14px;"></span>
    <form th:action="@{/logout}" method="post">
      <button class="nav-btn">Logout</button>
    </form>
  </div>
</nav>

<div class="container py-4">

  <div th:if="${param.generated}" class="alert alert-success alert-dismissible fade show">
    ✅ Bills generated for all residents! <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Stats -->
  <div class="row mb-4">
    <div class="col-md-4">
      <div class="stat-card">
        <div style="font-size:28px; font-weight:700; color:#6366f1;" th:text="${bills.size()}">0</div>
        <div class="text-muted">Total Bills</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <div style="font-size:28px; font-weight:700; color:#ef4444;" th:text="${unpaidCount}">0</div>
        <div class="text-muted">Unpaid Bills</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <div style="font-size:28px; font-weight:700; color:#10b981;"
             th:text="${bills.size() - unpaidCount}">0</div>
        <div class="text-muted">Paid Bills</div>
      </div>
    </div>
  </div>

  <div class="row">
    <!-- Generate Bills Form -->
    <div class="col-md-4 mb-4">
      <div class="card-modern">
        <h5 class="fw-bold mb-3">💸 Generate Monthly Bills</h5>
        <form th:action="@{/secretary/maintenance/generate}" method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Amount (₹)</label>
            <input type="number" name="amount" class="form-control" placeholder="e.g. 1500" step="0.01" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Bill Month</label>
            <input type="text" name="billMonth" class="form-control" placeholder="e.g. May 2025" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Due Date</label>
            <input type="date" name="dueDate" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100"
                  onclick="return confirm('Generate bills for ALL residents?')">
            Generate Bills
          </button>
        </form>
      </div>
    </div>

    <!-- Bills Table -->
    <div class="col-md-8">
      <div class="card-modern">
        <h5 class="fw-bold mb-3">📋 All Bills</h5>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead class="table-light">
              <tr>
                <th>Resident</th>
                <th>Month</th>
                <th>Amount</th>
                <th>Due Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${bills.empty}">
                <td colspan="5" class="text-center text-muted">No bills generated yet.</td>
              </tr>
              <tr th:each="bill : ${bills}">
                <td>
                  <div th:text="${bill.resident.name}" class="fw-semibold"></div>
                  <small class="text-muted" th:text="${bill.resident.flatNumber}"></small>
                </td>
                <td th:text="${bill.billMonth}"></td>
                <td th:text="'₹' + ${bill.amount}"></td>
                <td th:text="${bill.dueDate}"></td>
                <td>
                  <span th:class="'badge-' + ${bill.status.name().toLowerCase()}"
                        th:text="${bill.status}"></span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
