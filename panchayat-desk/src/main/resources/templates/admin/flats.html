<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Flats — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; }
    .modern-nav { display:flex; justify-content:space-between; align-items:center;
      padding:14px 30px; background:#6366f1; color:white; }
    .nav-brand { font-weight:700; font-size:18px; color:white; text-decoration:none; }
    .nav-btn { border:none; padding:6px 14px; border-radius:6px; background:#ef4444; color:white; cursor:pointer; }
    .card-modern { background:white; border-radius:12px; padding:25px; box-shadow:0 4px 20px rgba(0,0,0,0.06); }
  </style>
</head>
<body>
<nav class="modern-nav">
  <a href="/admin/dashboard" class="nav-brand">🏢 PanchayatDesk Admin</a>
  <form th:action="@{/logout}" method="post">
    <button class="nav-btn">Logout</button>
  </form>
</nav>
<div class="container py-4">
  <h4 class="fw-bold mb-1">🏘️ Flats — <span th:text="${society.name}"></span></h4>
  <p class="text-muted mb-4" th:text="${society.address}"></p>
  <div class="card-modern">
    <div class="table-responsive">
      <table class="table table-hover">
        <thead class="table-light">
          <tr>
            <th>Flat No.</th><th>Floor</th><th>Type</th>
            <th>Occupancy</th><th>Owner</th><th>Tenant</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${flats.empty}">
            <td colspan="6" class="text-center text-muted">No flats added yet.</td>
          </tr>
          <tr th:each="flat : ${flats}">
            <td class="fw-semibold" th:text="${flat.flatNumber}"></td>
            <td th:text="${flat.floorNumber ?: '-'}"></td>
            <td th:text="${flat.flatType ?: '-'}"></td>
            <td th:text="${flat.occupancyType}"></td>
            <td th:text="${flat.owner != null ? flat.owner.name : '-'}"></td>
            <td th:text="${flat.tenant != null ? flat.tenant.name : '-'}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <a href="/admin/societies" class="btn btn-outline-secondary mt-3">← Back to Societies</a>
</div>
</body>
</html>
