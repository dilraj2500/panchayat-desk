<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Societies — PanchayatDesk</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background:#f8fafc;
        }

        /* NAVBAR */
        .modern-nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 30px;
            background:#6366f1;
            color:white;
        }
        .nav-brand {
            font-weight:700;
            color:white;
            text-decoration:none;
        }
        .nav-btn {
            padding:6px 14px;
            border:none;
            border-radius:6px;
            background:#6366f1;
            color:white;
        }
        .nav-btn-outline {
            background:transparent;
            border:1px solid rgba(255,255,255,0.5);
        }
        .nav-btn-danger {
            background:#ef4444;
        }

        /* PAGE */
        .page-title {
            font-size:26px;
            font-weight:700;
        }
        .page-subtitle {
            color:#64748b;
        }

        /* CARD */
        .card-modern {
            background:white;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,0.05);
            overflow:hidden;
        }
        .card-header-modern {
            padding:18px;
            border-bottom:1px solid #e2e8f0;
            font-weight:700;
        }
        .card-body-modern {
            padding:18px;
        }

        /* FORM */
        .form-group-modern {
            margin-bottom:14px;
        }
        .form-label-modern {
            font-size:13px;
            font-weight:600;
            margin-bottom:4px;
            display:block;
        }
        .form-control-modern {
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #cbd5f5;
        }

        /* BUTTON */
        .btn-modern {
            padding:10px;
            border-radius:8px;
            border:none;
        }
        .btn-primary-modern {
            background:#6366f1;
            color:white;
        }

        /* TABLE */
        .table-modern {
            width:100%;
            border-collapse:collapse;
        }
        .table-modern th,
        .table-modern td {
            padding:12px;
            border-bottom:1px solid #e2e8f0;
        }

        /* BADGE */
        .badge-modern {
            padding:6px 12px;
            border-radius:6px;
            font-size:12px;
        }
        .badge-resolved {
            background:#d1fae5;
            color:#059669;
        }

        /* EMPTY */
        .empty-state {
            text-align:center;
            padding:20px;
        }

        /* ALERT */
        .alert-modern {
            padding:12px;
            border-radius:8px;
        }
        .alert-success-modern {
            background:#d1fae5;
        }
    </style>
</head>

<body>

<nav class="modern-nav">
    <a href="/admin/dashboard" class="nav-brand">PanchayatDesk</a>
    <div>
        <a href="/admin/dashboard" class="nav-btn nav-btn-outline">← Dashboard</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button class="nav-btn nav-btn-danger">Logout</button>
        </form>
    </div>
</nav>

<div style="padding:30px;">

    <div th:if="${param.added}" class="alert-modern alert-success-modern">
        ✅ Society added successfully!
    </div>

    <h1 class="page-title">Manage Societies</h1>
    <p class="page-subtitle">Add and manage societies</p>

    <div class="row g-4">

        <!-- FORM -->
        <div class="col-md-5">
            <div class="card-modern">
                <div class="card-header-modern">➕ Add Society</div>

                <div class="card-body-modern">
                    <form th:action="@{/admin/society/add}" method="post">

                        <div class="form-group-modern">
                            <label class="form-label-modern">Name</label>
                            <input type="text" name="name" class="form-control-modern" required>
                        </div>

                        <div class="form-group-modern">
                            <label class="form-label-modern">Address</label>
                            <input type="text" name="address" class="form-control-modern">
                        </div>

                        <div class="row">
                            <div class="col-6">
                                <input type="text" name="city" class="form-control-modern" placeholder="City">
                            </div>
                            <div class="col-6">
                                <input type="text" name="state" class="form-control-modern" placeholder="State">
                            </div>
                        </div>

                        <div class="form-group-modern">
                            <label class="form-label-modern">Secretary Email</label>
                            <input type="email" name="secretaryEmail" class="form-control-modern">
                        </div>

                        <div class="form-group-modern">
                            <label class="form-label-modern">Password</label>
                            <input type="password" name="secretaryPassword" class="form-control-modern">
                        </div>

                        <button class="btn-modern btn-primary-modern w-100">
                            Add Society →
                        </button>

                    </form>
                </div>
            </div>
        </div>

        <!-- LIST -->
        <div class="col-md-7">
            <div class="card-modern">
                <div class="card-header-modern">All Societies</div>

                <table class="table-modern">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>City</th>
                        <th>Email</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="s,i : ${societies}">
                        <td th:text="${i.index+1}"></td>
                        <td th:text="${s.name}"></td>
                        <td th:text="${s.city}"></td>
                        <td th:text="${s.secretaryEmail}"></td>
                        <td>
                          <a th:href="@{/admin/society/{id}/flats(id=${s.id})}"
                             class="btn btn-sm btn-outline-primary">🏠 View Flats</a>
                        </td>
                    </tr>
                    </tbody>
                </table>

            </div>
        </div>

    </div>
</div>

</body>
</html>
