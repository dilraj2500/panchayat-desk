<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Users — PanchayatDesk</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background:#f8fafc;
        }

        /* NAVBAR */
        .modern-nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 30px;
            background:#6366f1;
            color:white;
        }
        .nav-brand {
            font-weight:700;
            color:white;
            text-decoration:none;
        }
        .nav-btn {
            padding:6px 14px;
            border:none;
            border-radius:6px;
            background:#6366f1;
            color:white;
        }
        .nav-btn-outline {
            background:transparent;
            border:1px solid rgba(255,255,255,0.5);
        }
        .nav-btn-danger {
            background:#ef4444;
        }

        /* PAGE */
        .page-title {
            font-size:26px;
            font-weight:700;
        }
        .page-subtitle {
            color:#64748b;
        }

        /* CARD */
        .card-modern {
            background:white;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,0.05);
            padding:20px;
        }

        /* TABLE */
        .table-modern {
            width:100%;
            border-collapse:collapse;
        }
        .table-modern th,
        .table-modern td {
            padding:12px;
            border-bottom:1px solid #e2e8f0;
            text-align:left;
        }

        /* BADGES */
        .badge-modern {
            padding:6px 12px;
            border-radius:6px;
            font-size:12px;
        }
        .badge-resolved { background:#d1fae5; color:#059669; }
        .badge-inprogress { background:#dbeafe; color:#2563eb; }
        .badge-rejected { background:#fee2e2; color:#b91c1c; }

        /* BUTTON */
        .btn-modern {
            padding:6px 12px;
            border-radius:6px;
            border:none;
        }
        .btn-danger-modern {
            background:#ef4444;
            color:white;
        }
        .btn-sm-modern {
            font-size:12px;
        }

        /* ALERT */
        .alert-modern {
            padding:12px;
            border-radius:8px;
        }
        .alert-success-modern {
            background:#d1fae5;
        }

        /* EMPTY */
        .empty-state {
            text-align:center;
            padding:20px;
        }
    </style>
</head>

<body>

<nav class="modern-nav">
    <a href="/admin/dashboard" class="nav-brand">PanchayatDesk</a>
    <div>
        <a href="/admin/dashboard" class="nav-btn nav-btn-outline">← Dashboard</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button class="nav-btn nav-btn-danger">Logout</button>
        </form>
    </div>
</nav>

<div style="padding:30px;">

    <div th:if="${param.deleted}" class="alert-modern alert-success-modern">
        ✅ User deleted successfully!
    </div>

    <h1 class="page-title">All Users</h1>
    <p class="page-subtitle">Manage all registered users</p>

    <div class="card-modern">

        <table class="table-modern">
            <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Society</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="u,i : ${users}">
                <td th:text="${i.index+1}"></td>

                <td style="font-weight:600;" th:text="${u.name}"></td>

                <td th:text="${u.email}"></td>

                <td>
                        <span th:class="${'badge-modern ' +
                            (u.role.name() == 'ADMIN' ? 'badge-rejected' :
                             u.role.name() == 'SECRETARY' ? 'badge-inprogress' : 'badge-resolved')}"
                              th:text="${u.role}">
                        </span>
                </td>

                <td th:text="${u.society != null ? u.society.name : 'N/A'}"></td>

                <td>
                        <span th:class="${u.isActive ? 'badge-modern badge-resolved' : 'badge-modern badge-rejected'}"
                              th:text="${u.isActive ? 'Active' : 'Inactive'}">
                        </span>
                </td>

                <td>
                    <form th:action="@{/admin/user/{id}/delete(id=${u.id})}" method="post"
                          onsubmit="return confirm('Delete this user?')">
                        <button class="btn-modern btn-danger-modern btn-sm-modern">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="7">
                    <div class="empty-state">
                        <div>👥</div>
                        <div>No users yet!</div>
                    </div>
                </td>
            </tr>

            </tbody>
        </table>

    </div>
</div>

</body>
</html>
