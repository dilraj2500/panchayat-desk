<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — PanchayatDesk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">🏛️ PanchayatDesk</div>
        <p class="auth-subtitle">Welcome back! Login to your account</p>

        <div th:if="${param.error}" class="alert-modern alert-danger-modern">
            ❌ Invalid email or password!
        </div>
        <div th:if="${param.logout}" class="alert-modern alert-success-modern">
            ✅ Logged out successfully!
        </div>
        <div th:if="${param.registered}" class="alert-modern alert-success-modern">
            ✅ Registered! Please login.
        </div>
        <div th:if="${param.expired}" class="alert-modern alert-danger-modern">
            ⚠️ Session expired! Please login again.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group-modern">
                <label class="form-label-modern">Email Address</label>
                <input type="email" name="username" class="form-control-modern"
                       placeholder="Enter your email" required>
            </div>
            <div class="form-group-modern">
                <label class="form-label-modern">Password</label>
                <input type="password" name="password" class="form-control-modern"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-modern btn-primary-modern w-100"
                    style="justify-content:center; padding:14px;">
                Login →
            </button>
        </form>
        <p style="text-align:center; margin-top:24px; font-size:14px; color:#64748b;">
            Don't have account?
            <a th:href="@{/register}" style="color:#6366f1; font-weight:600;">Register here</a>
        </p>
    </div>
</div>
</body>
</html>
