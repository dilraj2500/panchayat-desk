<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register — PanchayatDesk</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ INLINE CSS -->
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .auth-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .auth-logo {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }

        .auth-subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 20px;
        }

        .form-label-modern {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .form-control-modern {
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .form-control-modern:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
        }

        .btn-modern {
            border-radius: 8px;
            font-weight: 600;
            border: none;
        }

        .btn-primary-modern {
            background: #6366f1;
            color: white;
        }

        .btn-primary-modern:hover {
            background: #4f46e5;
        }

        .alert-modern {
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        .alert-danger-modern {
            background: #fee2e2;
            color: #b91c1c;
        }

        select.form-control-modern {
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="auth-container">
    <div class="auth-card">

        <div class="auth-logo">🏛️ PanchayatDesk</div>
        <p class="auth-subtitle">Create your account</p>

        <div th:if="${error}" class="alert-modern alert-danger-modern" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label-modern">Full Name</label>
                    <input type="text" name="name" class="form-control-modern" placeholder="Enter full name" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label-modern">Phone Number</label>
                    <input type="text" name="phoneNumber" class="form-control-modern" placeholder="Enter phone number">
                </div>

                <div class="col-md-6">
                    <label class="form-label-modern">Email Address</label>
                    <input type="email" name="email" class="form-control-modern" placeholder="Enter email" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label-modern">Flat Number</label>
                    <input type="text" name="flatNumber" class="form-control-modern" placeholder="e.g. A-101">
                </div>

                <div class="col-12">
                    <label class="form-label-modern">Password</label>
                    <input type="password" name="password" class="form-control-modern" placeholder="Create password" required>
                </div>

                <div class="col-12">
                    <label class="form-label-modern">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control-modern"
                           placeholder="Confirm password" required onchange="validatePasswordMatch()">
                    <small id="passwordError" style="color: #ef4444; display: none;">Passwords do not match</small>
                </div>

                <div class="col-12">
                    <label class="form-label-modern">Select Society</label>
                    <select name="societyId" class="form-control-modern" required>
                        <option value="">-- Select Society --</option>
                        <option th:each="society : ${societies}"
                                th:value="${society.id}"
                                th:text="${society.name}">
                        </option>
                    </select>
                </div>

            </div>

            <button type="submit" class="btn-modern btn-primary-modern w-100 mt-3"
                    onclick="return validateForm()">
                Create Account →
            </button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:14px; color:#64748b;">
            Already have account?
            <a th:href="@{/login}" style="color:#6366f1; font-weight:600;">Login here</a>
        </p>

    </div>
</div>

<script>
    function validatePasswordMatch() {
        const password = document.querySelector('input[name="password"]').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorMsg = document.getElementById('passwordError');

        errorMsg.style.display = (confirmPassword && password !== confirmPassword) ? 'block' : 'none';
    }

    function validateForm() {
        const password = document.querySelector('input[name="password"]').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            document.getElementById('passwordError').style.display = 'block';
            return false;
        }
        return true;
    }
</script>

</body>
</html>
